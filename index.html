<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Homepage Clone</title>
    <link
    rel="stylesheet"
    href="http://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">

            <div class="nav-logo">
                <h2>amazon</h2>
            </div>

            <div class="nav-location">
                <p>Deliver to</p>
                <h4>India</h4>
            </div>

            <div class="nav-search">
                <input
                    type="text"
                    placeholder="Search Amazon">
                
                <button>
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <div class="nav-account">
                <p>Hello, Sign in</p>
                <h4>Account & Lists</h4>
            </div>

            <div class="nav-orders">
                <p>Returns</p>
                <h4>& Orders</h4>
            </div>

            <div class="nav-cart">
                <i class="fa-solid fa-cart-shopping"></i>
                <span>Cart</span>
            </div>

        </nav>
    </header>
</body>
</html>
